# Builds and publishes the desktop app packages per OS on tag.
# Requires macOS signing secrets for production release builds.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  MILIM_RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Validate release tag
        working-directory: apps/desktop
        run: node scripts/validate-release-tag.mjs
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${MILIM_RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${MILIM_RELEASE_TAG}" \
              --draft \
              --title "milim ${MILIM_RELEASE_TAG}" \
              --verify-tag

  desktop:
    needs: create-draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, args: "--target universal-apple-darwin --bundles app,dmg", artifact: "macos-universal" }
          - { os: windows-latest, args: "", artifact: "windows-x64" }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      MILIM_RELEASE_ARTIFACT_NAME: milim-${{ matrix.artifact }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> target
      - name: Validate release tag
        working-directory: apps/desktop
        run: node scripts/validate-release-tag.mjs
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ env.MILIM_RELEASE_TAG }}
      - name: macOS Rust targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Require macOS signing secrets
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required macOS signing secret: $name"
              missing=1
            fi
          done
          exit "$missing"
      - run: pnpm -C apps/desktop install --frozen-lockfile
      - name: Run pnpm -C apps/desktop verify
        env:
          GITHUB_REF_TYPE: tag
          GITHUB_REF_NAME: ${{ env.MILIM_RELEASE_TAG }}
        run: pnpm -C apps/desktop verify
      - name: Build macOS app and DMG
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm -C apps/desktop tauri build ${{ matrix.args }}
      - name: Upload macOS direct download alias to draft release
        if: matrix.os == 'macos-latest'
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          dmg="$(find src-tauri/target -path '*/release/bundle/dmg/*.dmg' -print -quit)"
          if [ -z "$dmg" ]; then
            echo "macOS DMG not found under src-tauri/target" >&2
            exit 1
          fi
          alias_dir="${RUNNER_TEMP}/milim-release-aliases"
          mkdir -p "$alias_dir"
          alias_dmg="$alias_dir/milim-macos-universal.dmg"
          cp "$dmg" "$alias_dmg"
          hash="$(shasum -a 256 "$alias_dmg" | awk '{print $1}')"
          printf "%s  milim-macos-universal.dmg\n" "$hash" > "$alias_dmg.sha256"
          mkdir -p release-artifacts/updater-checksums
          cp "$alias_dmg.sha256" release-artifacts/updater-checksums/
          for attempt in 1 2 3; do
            if gh release upload "${{ env.MILIM_RELEASE_TAG }}" "$alias_dmg" "$alias_dmg.sha256" --clobber; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
      - name: Create macOS app zip updater asset
        if: matrix.os == 'macos-latest'
        working-directory: apps/desktop
        shell: bash
        run: |
          app_bundle="$(find src-tauri/target -path '*/release/bundle/macos/milim.app' -print -quit)"
          if [ -z "$app_bundle" ]; then
            echo "milim.app bundle not found under src-tauri/target" >&2
            exit 1
          fi
          app_dir="$(dirname "$app_bundle")"
          (cd "$app_dir" && rm -f milim.app.zip milim.app.zip.sha256 && ditto -c -k --keepParent milim.app milim.app.zip)
          hash="$(shasum -a 256 "$app_dir/milim.app.zip" | awk '{print $1}')"
          printf "%s  milim.app.zip\n" "$hash" > "$app_dir/milim.app.zip.sha256"
          mkdir -p release-artifacts/updater-checksums
          cp "$app_dir/milim.app.zip.sha256" release-artifacts/updater-checksums/
      - name: Upload macOS updater asset to draft release
        if: matrix.os == 'macos-latest'
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          app_zip="$(find src-tauri/target -path '*/release/bundle/macos/milim.app.zip' -print -quit)"
          if [ -z "$app_zip" ]; then
            echo "milim.app.zip not found under src-tauri/target" >&2
            exit 1
          fi
          for attempt in 1 2 3; do
            if gh release upload "${{ env.MILIM_RELEASE_TAG }}" "$app_zip" "$app_zip.sha256" --clobber; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
      - name: Build Windows portable binary
        if: matrix.os == 'windows-latest'
        run: pnpm -C apps/desktop tauri build --no-bundle
      - name: Smoke release binary
        working-directory: apps/desktop
        run: node scripts/smoke-release-binary.mjs
      - name: Stage Windows portable artifact
        if: matrix.os == 'windows-latest'
        working-directory: apps/desktop
        run: node scripts/stage-portable-release-artifact.mjs
      - name: Upload Windows direct download alias to draft release
        if: matrix.os == 'windows-latest'
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $portable = Get-ChildItem -Path "src-tauri/target/release/bundle/portable" -Filter "*.exe" | Select-Object -First 1
          if (-not $portable) {
            throw "Windows portable EXE not found under src-tauri/target/release/bundle/portable"
          }
          $aliasDir = Join-Path $env:RUNNER_TEMP "milim-release-aliases"
          New-Item -ItemType Directory -Force -Path $aliasDir | Out-Null
          $aliasExe = Join-Path $aliasDir "milim-windows-x64-portable.exe"
          Copy-Item -LiteralPath $portable.FullName -Destination $aliasExe
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $aliasExe).Hash.ToLowerInvariant()
          $aliasChecksum = "$aliasExe.sha256"
          Set-Content -Encoding ASCII -LiteralPath $aliasChecksum -Value "$hash  milim-windows-x64-portable.exe"
          $checksumDir = Join-Path "release-artifacts" "updater-checksums"
          New-Item -ItemType Directory -Force -Path $checksumDir | Out-Null
          Copy-Item -LiteralPath $aliasChecksum -Destination $checksumDir
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            gh release upload "${{ env.MILIM_RELEASE_TAG }}" $aliasExe $aliasChecksum --clobber
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }
            Start-Sleep -Seconds ($attempt * 10)
          }
      - name: Generate artifact manifest
        working-directory: apps/desktop
        env:
          GITHUB_REF_TYPE: tag
          GITHUB_REF_NAME: ${{ env.MILIM_RELEASE_TAG }}
        run: node scripts/generate-release-manifest.mjs
      - name: Verify artifact manifest
        working-directory: apps/desktop
        run: node scripts/verify-release-manifest.mjs
      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ matrix.artifact }}
          path: |
            apps/desktop/release-artifacts/manifest.json
            apps/desktop/release-artifacts/SHA256SUMS.txt
          if-no-files-found: error
      - name: Upload updater checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-checksums-${{ matrix.artifact }}
          path: apps/desktop/release-artifacts/updater-checksums/*.sha256
          if-no-files-found: error

  publish-release-checksums:
    needs: desktop
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.MILIM_RELEASE_TAG }}
      - name: Download release manifest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-manifest-*
          path: release-manifests
      - name: Download updater checksum artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-checksums-*
          path: release-checksums
          merge-multiple: true
      - name: Publish release manifest and SHA256SUMS.txt updater assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          rm -rf release-published
          node apps/desktop/scripts/merge-release-manifests.mjs release-manifests release-published
          if ! compgen -G "release-checksums/*.sha256" > /dev/null; then
            echo "No updater checksum sidecars found in this release run" >&2
            exit 1
          fi
          cat release-checksums/*.sha256 | sort -k2 > release-published/SHA256SUMS.txt
          for attempt in 1 2 3; do
            if gh release upload "${MILIM_RELEASE_TAG}" release-published/manifest.json release-published/SHA256SUMS.txt --repo "${GITHUB_REPOSITORY}" --clobber; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
