name: Site

on:
  pull_request:
    paths:
      - "apps/site/**"
      - "docs/wiki/**"
      - ".github/workflows/site.yml"
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "docs/wiki/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/site/pnpm-lock.yaml
      - run: pnpm -C apps/site install --frozen-lockfile
      - run: pnpm -C apps/site build

  deploy:
    name: Deploy
    needs: check
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://milim.ai
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/site/pnpm-lock.yaml
      - run: pnpm -C apps/site install --frozen-lockfile
      - run: pnpm -C apps/site build
      - name: Deploy to Cloudflare Pages
        run: pnpm -C apps/site exec wrangler pages deploy dist --project-name milim-site --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
