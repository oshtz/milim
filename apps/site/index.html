<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>milim - Local-first AI workbench</title>
    <meta
      name="description"
      content="milim is an MIT-licensed local-first AI workbench for chat, agents, tools, memory, voice, and privacy controls across multiple model providers."
    />
    <link rel="canonical" href="https://milim.ai/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://milim.ai/" />
    <meta property="og:title" content="milim - Local-first AI workbench" />
    <meta
      property="og:description"
      content="Chat, agents, tools, memory, voice, and privacy controls in one MIT-licensed desktop app."
    />
    <meta property="og:image" content="https://milim.ai/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="milim - Local-first AI workbench" />

      name="twitter:description"
      content="An MIT-licensed desktop AI workbench for people who use more than one model."
    />
    <meta name="twitter:image" content="https://milim.ai/assets/og-image.png" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("milim-theme");
          document.documentElement.dataset.theme = /^(system|dark|light)$/.test(theme || "") ? theme : "system";
        } catch {
          document.documentElement.dataset.theme = "system";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
